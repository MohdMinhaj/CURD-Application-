<!DOCTYPE html>
<html>
<head>

<title>Update Data</title>

<link rel="stylesheet" type="text/css" href="update.css">

</head>
<body>

<h1>Update Student Data</h1>

<form action="UpdateData">

<label>Student ID</label>

</form>
</body>
